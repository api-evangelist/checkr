description: >-
  FinOps view of Checkr spend. Checkr bills on a per-check basis by package
  tier rather than by API call - the dominant cost driver is the number of
  reports / screenings ordered and which package each uses (Basic+, Essential,
  Professional, or a custom package). On top of the package price, certain
  screenings incur pass-through third-party fees (county/state court access,
  DMV/MVR access, education and employment verification, international fees)
  that Checkr invoices at cost without markup, making some report costs variable
  and jurisdiction-dependent. High-volume programs are governed by custom /
  enterprise agreements with negotiated volume pricing. Cost control centers on
  choosing the right package per role, scoping screenings to what compliance
  requires, and allocating spend across nodes in the account hierarchy.
notes: >-
  Per-check package prices and pass-through fees vary and are not fully
  reconciled here; verify on the Checkr pricing page and account invoices. The
  API itself carries no separate metered fee - you pay for the background checks
  you order.
