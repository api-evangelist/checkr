  unit: usd
  aggregation: sum
  dimensions:
  - account
  - package
- name: court_access_fees
  description: Pass-through county/state court access fees on criminal searches, billed at cost.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - jurisdiction
- name: dmv_access_fees
  description: Pass-through DMV/MVR access fees on motor vehicle report screenings, billed at cost.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - state
- name: verification_fees
  description: Pass-through education, employment, and international verification fees, billed at cost.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - screening_type
principles:
- name: Visibility
  description: Track report volume and cost per package and per node; separate base package price from variable pass-through court/DMV/verification fees.
- name: Allocation
  description: Use the account hierarchy (nodes) and report tags to map background-check spend to locations, departments, or hiring teams.
- name: Optimization
  description: Match each role to the least-expensive package that meets compliance needs; avoid over-screening; use continuous checks/subscriptions only where ongoing monitoring is justified.
- name: Accountability
  description: Assign report ordering to specific nodes/programs and review monthly invoices, including pass-through fees, against hiring budgets.
