actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Checkr's own public API is
    request/response REST, and asynchronous screening results are delivered via
    webhooks (HTTP POST callbacks over HTTPS or Amazon SNS), which are not a
    WebSocket or SSE server-push transport. No AsyncAPI document was created
    because there is no realtime streaming channel on Checkr's API to model.
