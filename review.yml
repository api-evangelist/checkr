  endpointsModeled:
    - Individual screening subtypes beyond those confirmed (e.g. state_criminal_searches, global_watchlist_search, international variants) follow the same /reports/{report_id}/{screening_type}/{id} pattern and are represented generically in the OpenAPI Screening schema.
    - Node/geo update and delete verbs and the Form I-9 (/i9/forms_i9, /i9/worksites) surface are documented by Checkr but only a representative subset is modeled in this repo's OpenAPI.
