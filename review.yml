aid: checkr
name: Checkr
review:
  question: Does Checkr expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Checkr's public API surface is
    request/response REST over HTTPS. Asynchronous, long-running screening
    results are delivered through webhooks - Checkr POSTs event notifications
    (report.completed, candidate.created, invitation.completed, etc.) to a
    subscriber-configured HTTPS endpoint or Amazon SNS topic. Webhooks are
    server-to-endpoint HTTP callbacks, not a server-push streaming transport
    (WebSocket or SSE) on Checkr's own API, so there is no realtime channel to
    model in AsyncAPI at the review date.
findings:
  summary: |
    Checkr does not publish a documented public WebSocket API. Checkr is an
    employment background check platform. Its public API is a RESTful HTTPS
    interface at https://api.checkr.com/v1 (staging at
    https://api.checkr-staging.com/v1), authenticated with HTTP Basic auth
    using a secret API key as the username and an empty password; Checkr
    Partner integrations authenticate via OAuth. The API is pure
    request/response REST returning JSON. Because background checks are
    long-running, Checkr delivers status updates asynchronously through
    webhooks (HTTP POST callbacks to a configured HTTPS endpoint or Amazon
    SNS), not through a persistent WebSocket. No realtime, bidirectional, or
    streaming WebSocket (ws:// or wss://) endpoint is documented anywhere in
    Checkr's API reference.
  authentication: |
    HTTP Basic auth with the secret API key as username and an empty password.
    Publishable keys exist for the client-side JS API only. Checkr Partners use
    OAuth to act on behalf of customer accounts (partner developer guides at
    docs.checkr.com/partners).
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.checkr.com/v1
      documented: true
      note: Primary API surface. Staging base is https://api.checkr-staging.com/v1.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Checkr POSTs event notifications to a subscriber HTTPS endpoint or Amazon SNS topic. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Checkr's API reference as of the review date.
