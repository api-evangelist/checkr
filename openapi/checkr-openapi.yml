  /reports/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getReport
      tags: [Reports]
      summary: Retrieve a report
      parameters:
        - name: include
          in: query
          description: Comma-separated related resources to embed (e.g. documents,geos).
          schema:
            type: string
      responses:
        '200':
          description: The report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
    post:
      operationId: updateReport
      tags: [Reports]
      summary: Update or upgrade a report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                package:
                  type: string
                  description: A package slug to upgrade the report to.
      responses:
        '200':
          description: The updated report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
  /reports/{id}/complete:
    parameters:
