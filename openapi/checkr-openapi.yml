openapi: 3.0.3
info:
  title: Checkr API
  description: >-
    The Checkr API is a RESTful interface for running compliant employment
    background checks. Employers, staffing firms, and platform partners create
    candidates, send invitations, order packages, and retrieve reports composed
    of individual screenings - SSN trace, county/state/national/federal criminal
    searches, sex offender registry, motor vehicle records, and education /
    employment verifications. The API also covers adverse action workflows,
    subscriptions and continuous checks, node/hierarchy and geo account
    structure, documents, Form I-9, and webhooks for event-driven report status
    updates. Authentication is HTTP Basic auth with your secret API key as the
    username and an empty password; Checkr Partner integrations use OAuth. All
    responses are JSON. This document models the widely used, publicly
    documented endpoints; it is not exhaustive of every screening type Checkr
    offers.
  version: '1.0'
  contact:
    name: Checkr
    url: https://checkr.com
  termsOfService: https://checkr.com/terms-of-service
servers:
  - url: https://api.checkr.com/v1
    description: Production
  - url: https://api.checkr-staging.com/v1
    description: Staging
security:
  - basicAuth: []
tags:
  - name: Candidates
    description: Candidate records that background checks are run against.
  - name: Invitations
    description: Hosted invitations for candidates to submit their own information.
  - name: Reports
    description: The container aggregating a candidate's screenings and result.
  - name: Screenings
    description: Individual screening components nested under a report.
  - name: Verifications
    description: Education and employment verification screenings.
  - name: Packages
    description: Bundles of screenings and the programs that group them.
  - name: Documents
    description: Files attached to a candidate.
  - name: Adverse Actions
    description: FCRA adverse action workflows against a report.
  - name: Subscriptions
    description: Recurring re-runs of a package for a candidate.
  - name: Continuous Checks
    description: Ongoing monitoring for new records.
  - name: Nodes and Hierarchy
    description: Tree of nodes modeling account/organization structure.
  - name: Geos
    description: State/locale definitions scoping pricing and compliance.
  - name: Webhooks
    description: Event notification subscriptions.
  - name: Account
    description: Account and user metadata.
paths:
  /candidates:
    get:
      operationId: listCandidates
      tags: [Candidates]
      summary: List candidates
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: A paginated list of candidates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createCandidate
      tags: [Candidates]
      summary: Create a candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CandidateCreate'
      responses:
        '201':
          description: The created candidate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /candidates/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getCandidate
      tags: [Candidates]
      summary: Retrieve a candidate
      responses:
        '200':
          description: The candidate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidate'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: updateCandidate
      tags: [Candidates]
      summary: Update a candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CandidateCreate'
      responses:
        '200':
          description: The updated candidate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidate'
    delete:
      operationId: deleteCandidatePII
      tags: [Candidates]
      summary: Request PII removal for a candidate
      responses:
        '200':
          description: PII removal requested.
  /candidates/{id}/documents:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: listCandidateDocuments
      tags: [Documents]
      summary: List candidate documents
      responses:
        '200':
          description: A list of documents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentList'
    post:
      operationId: uploadCandidateDocument
      tags: [Documents]
      summary: Upload a candidate document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  description: The document type, e.g. driver_license or motor_vehicle_report.
      responses:
        '201':
          description: The uploaded document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
  /candidates/{id}/documents/{document_id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
      - name: document_id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getCandidateDocument
      tags: [Documents]
      summary: Retrieve a candidate document
      responses:
        '200':
          description: The document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
