aid: checkr
url: https://raw.githubusercontent.com/api-evangelist/checkr/refs/heads/main/apis.yml
name: Checkr
kind: company
description: Checkr is a technology-driven background check platform for employment
  screening. Its REST API lets employers, staffing firms, and platform partners run
  compliant background checks programmatically - creating candidates, sending
  invitations, ordering packages, and retrieving reports composed of individual
  screenings (SSN trace, county/state/national/federal criminal searches, sex
  offender registry, motor vehicle records, education and employment verifications,
  and more). The API also covers adverse action workflows, continuous checks and
  subscriptions, node/hierarchy and geo account structure, Form I-9, documents, and
  webhooks for event-driven report status updates. Authentication is HTTP Basic auth
  with a secret API key, with OAuth for Checkr Partner integrations.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Background Checks
- Employment Screening
- Compliance
- HR Tech
- Identity Verification
- Criminal Records
created: '2026-07-03'
modified: '2026-07-03'
